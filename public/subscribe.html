<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYBA Premium 구독</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0A0A0A;
      color: #E5E5E5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }
    .container {
      max-width: 480px;
      width: 100%;
      padding: 24px 16px;
    }
    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    .header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #F7931A;
      margin-bottom: 4px;
    }
    .header p { font-size: 14px; color: #888; }

    /* Tier Cards */
    .tier-card {
      border: 2px solid #333;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .tier-card:hover { border-color: #555; }
    .tier-card.selected { border-color: #F7931A; background: rgba(247,147,26,0.08); }
    .tier-card.sold-out { opacity: 0.4; pointer-events: none; }
    .tier-card .tier-row { display: flex; justify-content: space-between; align-items: center; }
    .tier-card .tier-name { font-size: 17px; font-weight: 600; }
    .tier-card .tier-price { font-size: 15px; color: #F7931A; font-weight: 600; }
    .tier-card .tier-desc { font-size: 13px; color: #888; margin-top: 2px; }
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      color: #FFF;
    }
    .badge-green { background: #22C55E; }
    .badge-orange { background: #F59E0B; }

    /* Discount Code */
    .discount-section { margin-top: 20px; }
    .discount-section label { font-size: 13px; color: #888; display: block; margin-bottom: 6px; }
    .discount-row { display: flex; gap: 8px; }
    .discount-row input {
      flex: 1;
      padding: 12px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #1A1A1A;
      color: #E5E5E5;
      font-size: 14px;
      text-transform: uppercase;
    }
    .discount-row input:focus { outline: none; border-color: #F7931A; }
    .discount-row button {
      padding: 12px 20px;
      background: #F7931A;
      color: #FFF;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }
    .discount-msg { font-size: 12px; margin-top: 4px; }
    .discount-msg.success { color: #22C55E; }
    .discount-msg.error { color: #EF4444; }

    /* Price Summary */
    .price-summary {
      margin-top: 20px;
      background: #1A1A1A;
      border-radius: 8px;
      padding: 16px;
    }
    .price-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 14px; }
    .price-row.total { font-size: 18px; font-weight: 700; color: #F7931A; margin-top: 8px; padding-top: 8px; border-top: 1px solid #333; }
    .price-row .strikethrough { text-decoration: line-through; color: #666; }

    /* Pay Button */
    .pay-btn {
      width: 100%;
      padding: 16px;
      background: #F7931A;
      color: #FFF;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 24px;
      transition: opacity 0.2s;
    }
    .pay-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .pay-btn:hover:not(:disabled) { opacity: 0.9; }

    /* QR Section */
    .qr-section {
      display: none;
      margin-top: 24px;
      text-align: center;
    }
    .qr-section.visible { display: block; }
    .qr-container {
      background: #FFF;
      border-radius: 16px;
      padding: 20px;
      display: inline-block;
      margin-bottom: 16px;
      cursor: pointer;
    }
    .qr-container canvas { display: block; }
    .status-text { font-size: 14px; color: #888; margin-top: 12px; }
    .status-text.success { color: #22C55E; font-weight: 600; }
    .invoice-preview {
      margin-top: 12px;
      padding: 10px;
      background: #1A1A1A;
      border-radius: 8px;
      font-family: monospace;
      font-size: 10px;
      color: #666;
      word-break: break-all;
      max-height: 40px;
      overflow: hidden;
    }

    /* Success */
    .success-section {
      display: none;
      text-align: center;
      margin-top: 40px;
    }
    .success-section.visible { display: block; }
    .success-icon { font-size: 64px; margin-bottom: 16px; }
    .success-section h2 { font-size: 24px; color: #22C55E; margin-bottom: 8px; }
    .success-section p { color: #888; }

    .copy-msg { font-size: 12px; color: #22C55E; margin-top: 4px; }
    .hidden { display: none; }

    /* Loading */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #888;
      border-top-color: #F7931A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>SYBA Premium</h1>
      <p>Lightning으로 구독하기</p>
    </div>

    <!-- Tier Selection -->
    <div id="tierSection">
      <div class="tier-card selected" data-tier="monthly" onclick="selectTier('monthly')">
        <div class="tier-row">
          <div>
            <div class="tier-name">월간 구독</div>
            <div class="tier-desc">매월 갱신</div>
          </div>
          <div class="tier-price" id="price-monthly">1,000 sats/월</div>
        </div>
      </div>

      <div class="tier-card" data-tier="annual" onclick="selectTier('annual')">
        <div class="tier-row">
          <div>
            <div class="tier-name">연간 구독 <span class="badge badge-green">2개월 무료</span></div>
            <div class="tier-desc">연 1회 결제</div>
          </div>
          <div class="tier-price" id="price-annual">10,000 sats/년</div>
        </div>
      </div>

      <div class="tier-card" data-tier="lifetime" onclick="selectTier('lifetime')">
        <div class="tier-row">
          <div>
            <div class="tier-name">평생 구독 <span class="badge badge-orange" id="lifetime-badge">한정 50석</span></div>
            <div class="tier-desc">1회 결제, 영구 이용</div>
          </div>
          <div class="tier-price" id="price-lifetime">60,000 sats</div>
        </div>
      </div>
    </div>

    <!-- Discount Code -->
    <div class="discount-section">
      <label>할인코드</label>
      <div class="discount-row">
        <input type="text" id="discountInput" placeholder="코드 입력" />
        <button onclick="applyDiscount()">적용</button>
      </div>
      <div class="discount-msg" id="discountMsg"></div>
    </div>

    <!-- Price Summary -->
    <div class="price-summary" id="priceSummary">
      <div class="price-row" id="originalPriceRow" style="display:none;">
        <span>원가</span>
        <span class="strikethrough" id="originalPriceText"></span>
      </div>
      <div class="price-row" id="discountRow" style="display:none;">
        <span style="color:#22C55E">할인</span>
        <span style="color:#22C55E" id="discountText"></span>
      </div>
      <div class="price-row total">
        <span>결제 금액</span>
        <span id="finalPriceText">1,000 sats</span>
      </div>
    </div>

    <!-- Pay Button -->
    <button class="pay-btn" id="payBtn" onclick="startPayment()">
      ⚡ Lightning으로 결제하기
    </button>

    <!-- QR Code / Payment -->
    <div class="qr-section" id="qrSection">
      <div class="qr-container" onclick="copyInvoice()">
        <canvas id="qrCanvas"></canvas>
      </div>
      <div class="copy-msg hidden" id="copyMsg">복사됨!</div>
      <div class="status-text" id="statusText">
        <span class="spinner"></span> 결제 대기 중...
      </div>
      <div class="invoice-preview" id="invoicePreview"></div>
    </div>

    <!-- Success -->
    <div class="success-section" id="successSection">
      <div class="success-icon">✅</div>
      <h2>구독 완료!</h2>
      <p>SYBA 앱으로 돌아가면 프리미엄이 활성화됩니다.</p>
    </div>
  </div>

  <!-- QR Code library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <script>
    // ============================================================
    // Config — Supabase 연결 정보는 환경변수 또는 직접 입력
    // 이 값들은 ANON KEY (공개 가능)이므로 클라이언트에 노출 OK
    // ============================================================
    const SUPABASE_URL = 'https://tbjfzenhrjcygvqfpqwl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRiamZ6ZW5ocmpjeWd2cWZwcXdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk4NjUyNDAsImV4cCI6MjA4NTQ0MTI0MH0.WB_b-Bx_wOgCTjWIss0RE3Waz01jDLxS6ZoaBgZNCd8';

    // State
    let currentTier = 'monthly';
    let currentDiscount = null; // { id, discount_type, discount_value }
    let tierPrices = {
      monthly:  { price: 1000,  durationDays: 30  },
      annual:   { price: 10000, durationDays: 365 },
      lifetime: { price: 60000, durationDays: -1  },
    };
    let finalPrice = 1000;
    let currentInvoice = null;
    let userId = null;
    let supabaseClient = null;

    // Init
    window.addEventListener('DOMContentLoaded', async () => {
      // URL params
      const params = new URLSearchParams(window.location.search);
      userId = params.get('uid');
      const tierParam = params.get('tier');

      if (tierParam && ['monthly', 'annual', 'lifetime'].includes(tierParam)) {
        selectTier(tierParam);
      }

      // Init Supabase
      if (SUPABASE_URL && SUPABASE_ANON_KEY) {
        supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        await loadPricesFromDB();
      }

      updatePriceDisplay();
    });

    async function loadPricesFromDB() {
      if (!supabaseClient) return;
      try {
        const { data } = await supabaseClient
          .from('subscription_prices')
          .select('*')
          .eq('is_active', true);

        if (data && data.length > 0) {
          // monthly의 price_sats를 기준 가격으로 사용
          const monthlyRow = data.find(p => p.tier === 'monthly');
          const basePrice = monthlyRow ? monthlyRow.price_sats : 1000;
          const fallbackMultipliers = { monthly: 1, annual: 10, lifetime: 60 };

          data.forEach(p => {
            const multiplier = p.base_multiplier || fallbackMultipliers[p.tier] || 1;
            tierPrices[p.tier] = {
              price: basePrice * multiplier,
              durationDays: p.duration_days,
              maxQuantity: p.max_quantity,
              currentSold: p.current_sold,
            };
          });

          // Update lifetime badge
          const lt = tierPrices.lifetime;
          if (lt.maxQuantity && lt.maxQuantity !== -1) {
            const remaining = lt.maxQuantity - (lt.currentSold || 0);
            const badge = document.getElementById('lifetime-badge');
            if (remaining <= 0) {
              badge.textContent = '매진';
              document.querySelector('[data-tier="lifetime"]').classList.add('sold-out');
            } else {
              badge.textContent = `잔여 ${remaining}석`;
            }
          }

          // Update price labels
          document.getElementById('price-monthly').textContent = `${tierPrices.monthly.price.toLocaleString()} sats/월`;
          document.getElementById('price-annual').textContent = `${tierPrices.annual.price.toLocaleString()} sats/년`;
          document.getElementById('price-lifetime').textContent = `${tierPrices.lifetime.price.toLocaleString()} sats`;
        }
      } catch (e) {
        console.error('가격 로드 실패:', e);
      }
    }

    function selectTier(tier) {
      currentTier = tier;
      document.querySelectorAll('.tier-card').forEach(c => c.classList.remove('selected'));
      document.querySelector(`[data-tier="${tier}"]`).classList.add('selected');
      updatePriceDisplay();
    }

    async function applyDiscount() {
      const code = document.getElementById('discountInput').value.trim();
      const msgEl = document.getElementById('discountMsg');

      if (!code) {
        msgEl.textContent = '할인코드를 입력해주세요';
        msgEl.className = 'discount-msg error';
        return;
      }

      if (!supabaseClient) {
        msgEl.textContent = '서버 연결 오류';
        msgEl.className = 'discount-msg error';
        return;
      }

      try {
        const { data, error } = await supabaseClient
          .from('discount_codes')
          .select('*')
          .ilike('code', code)
          .eq('is_active', true)
          .single();

        if (error || !data) {
          currentDiscount = null;
          msgEl.textContent = '존재하지 않는 할인코드입니다';
          msgEl.className = 'discount-msg error';
          updatePriceDisplay();
          return;
        }

        const now = new Date();
        if (new Date(data.valid_until) < now) {
          msgEl.textContent = '만료된 할인코드입니다';
          msgEl.className = 'discount-msg error';
          currentDiscount = null;
          updatePriceDisplay();
          return;
        }

        if (data.max_uses !== -1 && data.current_uses >= data.max_uses) {
          msgEl.textContent = '사용 한도가 초과된 할인코드입니다';
          msgEl.className = 'discount-msg error';
          currentDiscount = null;
          updatePriceDisplay();
          return;
        }

        if (!data.applicable_tiers.includes(currentTier)) {
          msgEl.textContent = '이 구독 플랜에 적용할 수 없는 할인코드입니다';
          msgEl.className = 'discount-msg error';
          currentDiscount = null;
          updatePriceDisplay();
          return;
        }

        currentDiscount = {
          id: data.id,
          discount_type: data.discount_type,
          discount_value: data.discount_value,
        };

        msgEl.textContent = '할인코드가 적용되었습니다!';
        msgEl.className = 'discount-msg success';
        updatePriceDisplay();
      } catch (e) {
        msgEl.textContent = '할인코드 확인 중 오류가 발생했습니다';
        msgEl.className = 'discount-msg error';
      }
    }

    function updatePriceDisplay() {
      const basePrice = tierPrices[currentTier].price;
      let discountAmount = 0;

      if (currentDiscount) {
        if (currentDiscount.discount_type === 'percent') {
          discountAmount = Math.floor(basePrice * currentDiscount.discount_value / 100);
        } else {
          discountAmount = Math.min(currentDiscount.discount_value, basePrice - 1);
        }
      }

      finalPrice = Math.max(basePrice - discountAmount, 1);

      const origRow = document.getElementById('originalPriceRow');
      const discRow = document.getElementById('discountRow');

      if (discountAmount > 0) {
        origRow.style.display = 'flex';
        document.getElementById('originalPriceText').textContent = `${basePrice.toLocaleString()} sats`;
        discRow.style.display = 'flex';
        document.getElementById('discountText').textContent = `-${discountAmount.toLocaleString()} sats`;
      } else {
        origRow.style.display = 'none';
        discRow.style.display = 'none';
      }

      document.getElementById('finalPriceText').textContent = `${finalPrice.toLocaleString()} sats`;
    }

    async function startPayment() {
      const btn = document.getElementById('payBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> 인보이스 생성 중...';

      try {
        if (!userId) {
          alert('SYBA 앱에서 로그인 후 다시 시도해주세요.');
          btn.disabled = false;
          btn.textContent = '⚡ Lightning으로 결제하기';
          return;
        }

        if (!supabaseClient) {
          alert('서버 연결 오류');
          btn.disabled = false;
          btn.textContent = '⚡ Lightning으로 결제하기';
          return;
        }

        // Create payment via Blink proxy edge function
        const tierLabel = currentTier === 'monthly' ? '월간' : currentTier === 'annual' ? '연간' : '평생';
        const { data: invoiceData, error: invoiceError } = await supabaseClient.functions.invoke('blink-proxy', {
          body: {
            action: 'createInvoice',
            amountSats: finalPrice,
            memo: `SYBA 프리미엄 ${tierLabel} 구독`,
          },
        });

        // Edge Function 응답: { success, data: { paymentHash, paymentRequest, satoshis } }
        const invoice = invoiceData?.data;
        if (invoiceError || !invoice?.paymentRequest) {
          console.error('Invoice error:', invoiceError, invoiceData);
          throw new Error('인보이스 생성 실패');
        }

        // Create payment record
        const { data: payment, error: payError } = await supabaseClient
          .from('payments')
          .insert({
            user_id: userId,
            amount_sats: finalPrice,
            tier: currentTier,
            original_price_sats: tierPrices[currentTier].price,
            discount_code_id: currentDiscount?.id || null,
            discount_amount_sats: tierPrices[currentTier].price - finalPrice,
            lightning_invoice: invoice.paymentRequest,
            payment_hash: invoice.paymentHash,
            status: 'pending',
          })
          .select()
          .single();

        if (payError) throw new Error('결제 기록 생성 실패');

        currentInvoice = {
          paymentRequest: invoice.paymentRequest,
          paymentHash: invoice.paymentHash,
          paymentId: payment.id,
        };

        // Show QR
        showQR(invoice.paymentRequest);

        // Start polling
        pollPayment();
      } catch (e) {
        console.error('결제 시작 실패:', e);
        alert('결제 시작에 실패했습니다. 다시 시도해주세요.');
        btn.disabled = false;
        btn.textContent = '⚡ Lightning으로 결제하기';
      }
    }

    function showQR(invoice) {
      document.getElementById('tierSection').style.display = 'none';
      document.querySelector('.discount-section').style.display = 'none';
      document.getElementById('priceSummary').style.display = 'none';
      document.getElementById('payBtn').style.display = 'none';

      const qrSection = document.getElementById('qrSection');
      qrSection.classList.add('visible');

      const qr = new QRious({
        element: document.getElementById('qrCanvas'),
        value: invoice,
        size: 240,
        level: 'M',
      });

      document.getElementById('invoicePreview').textContent = invoice;
    }

    function copyInvoice() {
      if (!currentInvoice) return;
      navigator.clipboard.writeText(currentInvoice.paymentRequest).then(() => {
        const msg = document.getElementById('copyMsg');
        msg.classList.remove('hidden');
        setTimeout(() => msg.classList.add('hidden'), 2000);
      });
    }

    async function pollPayment() {
      if (!currentInvoice || !supabaseClient) return;

      const maxAttempts = 400; // 10분 (1.5초 간격)
      let attempts = 0;

      const poll = setInterval(async () => {
        attempts++;
        if (attempts > maxAttempts) {
          clearInterval(poll);
          document.getElementById('statusText').innerHTML = '⏰ 결제 시간이 초과되었습니다';
          return;
        }

        try {
          // Check via Blink proxy (Edge Function 응답: { success, data: 'PAID'|'PENDING'|'EXPIRED' })
          const { data } = await supabaseClient.functions.invoke('blink-proxy', {
            body: {
              action: 'checkPaymentStatus',
              paymentRequest: currentInvoice.paymentRequest,
            },
          });

          if (data?.data === 'PAID') {
            clearInterval(poll);
            await completePayment();
          }
        } catch (e) {
          // Ignore polling errors, keep trying
        }
      }, 1500);
    }

    async function completePayment() {
      document.getElementById('statusText').innerHTML = '<span class="spinner"></span> 구독 활성화 중...';

      try {
        // Update payment status
        await supabaseClient
          .from('payments')
          .update({ status: 'paid', paid_at: new Date().toISOString() })
          .eq('id', currentInvoice.paymentId);

        // Activate subscription
        const isLifetime = currentTier === 'lifetime';
        const durationDays = tierPrices[currentTier].durationDays;

        const now = new Date();
        const expiresAt = isLifetime ? null : new Date(now.getTime() + durationDays * 24 * 60 * 60 * 1000).toISOString();

        // Check existing subscription
        const { data: existing } = await supabaseClient
          .from('subscriptions')
          .select('*')
          .eq('user_id', userId)
          .order('created_at', { ascending: false })
          .limit(1)
          .single();

        if (existing && existing.status === 'active') {
          // Update existing
          const updateData = isLifetime
            ? { tier: 'lifetime', is_lifetime: true, expires_at: null }
            : { tier: currentTier, expires_at: expiresAt };

          await supabaseClient
            .from('subscriptions')
            .update(updateData)
            .eq('id', existing.id);
        } else {
          // Create new
          await supabaseClient
            .from('subscriptions')
            .insert({
              user_id: userId,
              status: 'active',
              tier: currentTier,
              is_lifetime: isLifetime,
              started_at: now.toISOString(),
              expires_at: expiresAt,
            });
        }

        // Increment tier sold count if limited
        if (tierPrices[currentTier].maxQuantity && tierPrices[currentTier].maxQuantity !== -1) {
          await supabaseClient.rpc('increment_tier_sold', { p_tier: currentTier });
        }

        // Show success
        document.getElementById('qrSection').classList.remove('visible');
        document.getElementById('successSection').classList.add('visible');
      } catch (e) {
        console.error('구독 활성화 실패:', e);
        document.getElementById('statusText').innerHTML = '⚠️ 결제는 완료되었으나 활성화에 실패했습니다. 앱에서 다시 확인해주세요.';
      }
    }
  </script>
</body>
</html>
