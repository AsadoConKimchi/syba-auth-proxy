<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYBA Premium</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0A0A0A;
      color: #E5E5E5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }
    .container {
      max-width: 480px;
      width: 100%;
      padding: 24px 16px;
    }
    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    .header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #F7931A;
      margin-bottom: 4px;
    }
    .header p { font-size: 14px; color: #888; }

    /* Tier Cards */
    .tier-card {
      border: 2px solid #333;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .tier-card:hover { border-color: #555; }
    .tier-card.selected { border-color: #F7931A; background: rgba(247,147,26,0.08); }
    .tier-card.sold-out { opacity: 0.4; pointer-events: none; }
    .tier-card.disabled { opacity: 0.3; pointer-events: none; }

    /* Upgrade Banner */
    .upgrade-banner {
      display: none;
      background: rgba(247,147,26,0.12);
      border: 1px solid #F7931A;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 14px;
      color: #F7931A;
      text-align: center;
    }
    .upgrade-banner.visible { display: block; }
    .tier-card .tier-row { display: flex; justify-content: space-between; align-items: center; }
    .tier-card .tier-name { font-size: 17px; font-weight: 600; }
    .tier-card .tier-price { font-size: 15px; color: #F7931A; font-weight: 600; }
    .tier-card .tier-desc { font-size: 13px; color: #888; margin-top: 2px; }
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      color: #FFF;
    }
    .badge-green { background: #22C55E; }
    .badge-orange { background: #F59E0B; }

    /* Discount Code */
    .discount-section { margin-top: 20px; }
    .discount-section label { font-size: 13px; color: #888; display: block; margin-bottom: 6px; }
    .discount-row { display: flex; gap: 8px; }
    .discount-row input {
      flex: 1;
      padding: 12px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #1A1A1A;
      color: #E5E5E5;
      font-size: 14px;
      text-transform: uppercase;
    }
    .discount-row input:focus { outline: none; border-color: #F7931A; }
    .discount-row button {
      padding: 12px 20px;
      background: #F7931A;
      color: #FFF;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }
    .discount-msg { font-size: 12px; margin-top: 4px; }
    .discount-msg.success { color: #22C55E; }
    .discount-msg.error { color: #EF4444; }

    /* Price Summary */
    .price-summary {
      margin-top: 20px;
      background: #1A1A1A;
      border-radius: 8px;
      padding: 16px;
    }
    .price-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 14px; }
    .price-row.total { font-size: 18px; font-weight: 700; color: #F7931A; margin-top: 8px; padding-top: 8px; border-top: 1px solid #333; }
    .price-row .strikethrough { text-decoration: line-through; color: #666; }

    /* Pay Button */
    .pay-btn {
      width: 100%;
      padding: 16px;
      background: #F7931A;
      color: #FFF;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 24px;
      transition: opacity 0.2s;
    }
    .pay-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .pay-btn:hover:not(:disabled) { opacity: 0.9; }

    /* QR Section */
    .qr-section {
      display: none;
      margin-top: 24px;
      text-align: center;
    }
    .qr-section.visible { display: block; }
    .qr-container {
      background: #FFF;
      border-radius: 16px;
      padding: 20px;
      display: inline-block;
      margin-bottom: 16px;
      cursor: pointer;
    }
    .qr-container canvas { display: block; }
    .status-text { font-size: 14px; color: #888; margin-top: 12px; }
    .status-text.success { color: #22C55E; font-weight: 600; }
    .invoice-preview {
      margin-top: 12px;
      padding: 10px;
      background: #1A1A1A;
      border-radius: 8px;
      font-family: monospace;
      font-size: 10px;
      color: #666;
      word-break: break-all;
      max-height: 40px;
      overflow: hidden;
    }

    /* Success */
    .success-section {
      display: none;
      text-align: center;
      margin-top: 40px;
    }
    .success-section.visible { display: block; }
    .success-icon { font-size: 64px; margin-bottom: 16px; }
    .success-section h2 { font-size: 24px; color: #22C55E; margin-bottom: 8px; }
    .success-section p { color: #888; }

    .copy-msg { font-size: 12px; color: #22C55E; margin-top: 4px; }
    .hidden { display: none; }

    /* Auth Section */
    .auth-section {
      display: none;
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-section.visible { display: block; }
    .auth-section h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .auth-section p { font-size: 14px; color: #888; margin-bottom: 20px; }
    .auth-qr-container {
      background: #FFF;
      border-radius: 16px;
      padding: 20px;
      display: inline-block;
      margin-bottom: 16px;
      cursor: pointer;
    }
    .auth-qr-container canvas { display: block; }
    .auth-copy-msg { font-size: 12px; color: #22C55E; margin-top: 4px; }
    .auth-copy-hint { font-size: 12px; color: #666; margin-top: 4px; }
    .auth-status { font-size: 14px; color: #888; margin-top: 12px; }

    /* Return to app */
    .return-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 32px;
      background: #F7931A;
      color: #FFF;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .return-btn:hover { opacity: 0.9; }

    /* Loading */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #888;
      border-top-color: #F7931A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>SYBA Premium</h1>
      <p id="headerSubtitle"></p>
    </div>

    <!-- LNURL-auth Section -->
    <div class="auth-section" id="authSection">
      <h2 id="authTitle"></h2>
      <p id="authDesc"></p>
      <div class="auth-qr-container" id="authQrContainer" onclick="copyAuthLnurl()">
        <canvas id="authQrCanvas"></canvas>
      </div>
      <div class="auth-copy-hint" id="authCopyHint"></div>
      <div class="auth-copy-msg hidden" id="authCopyMsg"></div>
      <div class="auth-status" id="authStatus"></div>
    </div>

    <!-- Upgrade Banner -->
    <div class="upgrade-banner" id="upgradeBanner"></div>

    <!-- Tier Selection -->
    <div id="tierSection">
      <div class="tier-card selected" data-tier="monthly" onclick="selectTier('monthly')">
        <div class="tier-row">
          <div>
            <div class="tier-name" id="tierNameMonthly"></div>
            <div class="tier-desc" id="tierDescMonthly"></div>
          </div>
          <div class="tier-price" id="price-monthly"></div>
        </div>
      </div>

      <div class="tier-card" data-tier="annual" onclick="selectTier('annual')">
        <div class="tier-row">
          <div>
            <div class="tier-name"><span id="tierNameAnnual"></span> <span class="badge badge-green" id="annualBadge"></span></div>
            <div class="tier-desc" id="tierDescAnnual"></div>
          </div>
          <div class="tier-price" id="price-annual"></div>
        </div>
      </div>

      <div class="tier-card" data-tier="lifetime" onclick="selectTier('lifetime')">
        <div class="tier-row">
          <div>
            <div class="tier-name"><span id="tierNameLifetime"></span> <span class="badge badge-orange" id="lifetime-badge"></span></div>
            <div class="tier-desc" id="tierDescLifetime"></div>
          </div>
          <div class="tier-price" id="price-lifetime"></div>
        </div>
      </div>
    </div>

    <!-- Discount Code -->
    <div class="discount-section">
      <label id="discountLabel"></label>
      <div class="discount-row">
        <input type="text" id="discountInput" />
        <button onclick="applyDiscount()" id="discountApplyBtn"></button>
      </div>
      <div class="discount-msg" id="discountMsg"></div>
    </div>

    <!-- Price Summary -->
    <div class="price-summary" id="priceSummary">
      <div class="price-row" id="originalPriceRow" style="display:none;">
        <span id="originalPriceLabel"></span>
        <span class="strikethrough" id="originalPriceText"></span>
      </div>
      <div class="price-row" id="creditRow" style="display:none;">
        <span style="color:#60A5FA" id="creditLabel"></span>
        <span style="color:#60A5FA" id="creditText"></span>
      </div>
      <div class="price-row" id="discountRow" style="display:none;">
        <span style="color:#22C55E" id="discountRowLabel"></span>
        <span style="color:#22C55E" id="discountText"></span>
      </div>
      <div class="price-row total">
        <span id="totalLabel"></span>
        <span id="finalPriceText"></span>
      </div>
    </div>

    <!-- Pay Button -->
    <button class="pay-btn" id="payBtn" onclick="startPayment()"></button>

    <!-- QR Code / Payment -->
    <div class="qr-section" id="qrSection">
      <div class="qr-container" onclick="copyInvoice()">
        <canvas id="qrCanvas"></canvas>
      </div>
      <div class="copy-msg hidden" id="copyMsg"></div>
      <div class="status-text" id="statusText"></div>
      <div class="invoice-preview" id="invoicePreview"></div>
    </div>

    <!-- Success -->
    <div class="success-section" id="successSection">
      <div class="success-icon">✅</div>
      <h2 id="successTitle"></h2>
      <p id="successDesc"></p>
      <a href="syba://" class="return-btn" id="returnToAppBtn"></a>
    </div>
  </div>

    // ============================================================
    // Bech32 인코딩 (LNURL용)
    // ============================================================
    const BECH32_CHARSET = 'qpzry9x8gf2tvdw0s3jn54khce6mua7l';

    function bech32Polymod(values) {
      const GEN = [0x3b6a57b2, 0x26508e6d, 0x1ea119fa, 0x3d4233dd, 0x2a1462b3];
      let chk = 1;
      for (const v of values) {
        const b = chk >> 25;
        chk = ((chk & 0x1ffffff) << 5) ^ v;
        for (let i = 0; i < 5; i++) {
          if ((b >> i) & 1) chk ^= GEN[i];
        }
      }
      return chk;
    }

    function bech32HrpExpand(hrp) {
      const ret = [];
      for (let i = 0; i < hrp.length; i++) ret.push(hrp.charCodeAt(i) >> 5);
      ret.push(0);
      for (let i = 0; i < hrp.length; i++) ret.push(hrp.charCodeAt(i) & 31);
      return ret;
    }

    function bech32CreateChecksum(hrp, data) {
      const values = bech32HrpExpand(hrp).concat(data).concat([0, 0, 0, 0, 0, 0]);
      const polymod = bech32Polymod(values) ^ 1;
      const ret = [];
      for (let i = 0; i < 6; i++) ret.push((polymod >> (5 * (5 - i))) & 31);
      return ret;
    }

    function convertBits(data, fromBits, toBits, pad) {
      let acc = 0, bits = 0;
      const ret = [], maxv = (1 << toBits) - 1;
      for (const value of data) {
        acc = (acc << fromBits) | value;
        bits += fromBits;
        while (bits >= toBits) { bits -= toBits; ret.push((acc >> bits) & maxv); }
      }
      if (pad && bits > 0) ret.push((acc << (toBits - bits)) & maxv);
      return ret;
    }

    function encodeLnurl(url) {
      const hrp = 'lnurl';
      const data = convertBits(Array.from(new TextEncoder().encode(url)), 8, 5, true);
      const checksum = bech32CreateChecksum(hrp, data);
      const combined = data.concat(checksum);
      let encoded = hrp + '1';
      for (const d of combined) encoded += BECH32_CHARSET[d];
      return encoded.toUpperCase();
    }

    // ============================================================
    // LNURL-auth
    // ============================================================
    function generateRandomHex(bytes) {
      const arr = new Uint8Array(bytes);
      crypto.getRandomValues(arr);
      return Array.from(arr).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function copyAuthLnurl() {
      if (!currentAuthLnurlEncoded) return;
      navigator.clipboard.writeText(currentAuthLnurlEncoded).then(() => {
        const msg = document.getElementById('authCopyMsg');
        msg.textContent = t('authCopied');
        msg.classList.remove('hidden');
        setTimeout(() => msg.classList.add('hidden'), 2000);
      });
    }

    async function startLnurlAuth() {
      if (!supabaseClient) return;

      const authSection = document.getElementById('authSection');
      authSection.classList.add('visible');

      document.getElementById('tierSection').style.display = 'none';
      document.querySelector('.discount-section').style.display = 'none';
      document.getElementById('priceSummary').style.display = 'none';
      document.getElementById('payBtn').style.display = 'none';

      try {
        const k1 = generateRandomHex(32);
        const { data: session, error } = await supabaseClient
          .from('lnurl_auth_sessions')
          .insert({ k1, status: 'pending' })
          .select()
          .single();

        if (error || !session) {
          document.getElementById('authStatus').textContent = t('authSessionFailed');
          return;
        }

        const callbackUrl = `${window.location.origin}/api/lnurl-auth?tag=login&k1=${k1}&action=login`;
        currentAuthLnurlEncoded = encodeLnurl(callbackUrl);

        new QRious({
          element: document.getElementById('authQrCanvas'),
          value: currentAuthLnurlEncoded,
          size: 240,
          level: 'M',
        });

        document.getElementById('authStatus').innerHTML = `<span class="spinner"></span> ${t('authWaiting')}`;

        const maxAttempts = 150;
        let attempts = 0;

        const authPoll = setInterval(async () => {
          attempts++;
          if (attempts > maxAttempts) {
            clearInterval(authPoll);
            document.getElementById('authStatus').textContent = t('authTimeout');
            return;
          }

          try {
            const { data: updated } = await supabaseClient
              .from('lnurl_auth_sessions')
              .select('*')
              .eq('id', session.id)
              .single();

            if (updated && updated.status === 'authenticated' && updated.linking_key) {
              clearInterval(authPoll);

              const { data: existingUser } = await supabaseClient
                .from('users')
                .select('*')
                .eq('linking_key', updated.linking_key)
                .single();

              if (existingUser) {
                userId = existingUser.id;
              } else {
                const { data: newUser } = await supabaseClient
                  .from('users')
                  .insert({ linking_key: updated.linking_key })
                  .select()
                  .single();
                if (newUser) userId = newUser.id;
              }

              if (userId) {
                authSection.classList.remove('visible');
                document.getElementById('tierSection').style.display = '';
                document.querySelector('.discount-section').style.display = '';
                document.getElementById('priceSummary').style.display = '';
                document.getElementById('payBtn').style.display = '';
                document.getElementById('authStatus').textContent = '';
              } else {
                document.getElementById('authStatus').textContent = t('authUserFailed');
              }
            }
          } catch (e) {
            // 폴링 에러 무시
          }
        }, 2000);

      } catch (e) {
        console.error('LNURL-auth 시작 실패:', e);
        document.getElementById('authStatus').textContent = t('authStartFailed');
      }
    }

    window.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.search);
      userId = params.get('uid');
      const tierParam = params.get('tier');
      const upgradeParam = params.get('upgrade');
      const langParam = params.get('lang');

      // 언어 설정
      if (langParam && TRANSLATIONS[langParam]) {
        currentLang = langParam;
      }
      document.documentElement.lang = currentLang;
      applyTranslations();

      // Init Supabase
      if (SUPABASE_URL && SUPABASE_ANON_KEY) {
        supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        await loadPricesFromDB();
      }

      // 업그레이드 모드 초기화
      if (upgradeParam === 'true' && userId && supabaseClient) {
        await initUpgradeMode();
      }

      if (tierParam && ['monthly', 'annual', 'lifetime'].includes(tierParam)) {
        selectTier(tierParam);
      }

      updatePriceDisplay();

      // uid 없으면 LNURL-auth 시작
      if (!userId) {
        startLnurlAuth();
      }
    });

    // ============================================================
    // 업그레이드 모드
    // ============================================================
    async function initUpgradeMode() {
      try {
        const { data: sub } = await supabaseClient
          .from('subscriptions')
          .select('*')
          .eq('user_id', userId)
          .eq('status', 'active')
          .order('created_at', { ascending: false })
          .limit(1)
          .single();

        if (!sub || sub.is_lifetime) return;

        currentSubscription = sub;
        isUpgradeMode = true;

        const { data: lastPayment } = await supabaseClient
          .from('payments')
          .select('*')
          .eq('user_id', userId)
          .eq('tier', sub.tier)
          .eq('status', 'paid')
          .order('paid_at', { ascending: false })
          .limit(1)
          .single();

        upgradePaidAmount = lastPayment?.amount_sats ?? 0;

        const now = new Date();
        let remainingDays = 0;
        if (sub.expires_at) {
          const expiresAt = new Date(sub.expires_at);
          if (expiresAt > now) {
            remainingDays = Math.ceil((expiresAt.getTime() - now.getTime()) / (24 * 60 * 60 * 1000));
          }
        }

        const currentDurationDays = tierPrices[sub.tier]?.durationDays ?? 365;
        if (upgradePaidAmount > 0 && currentDurationDays > 0 && remainingDays > 0) {
          const dailyRate = upgradePaidAmount / currentDurationDays;
          upgradeCredit = Math.floor(dailyRate * remainingDays);
        }

        // 배너 표시
        const tierLabel = t('tierLabel' + sub.tier.charAt(0).toUpperCase() + sub.tier.slice(1));
        const banner = document.getElementById('upgradeBanner');
        banner.textContent = t('upgradeBanner', { tier: tierLabel, days: remainingDays });
        banner.classList.add('visible');

        // 현재 티어 이하 비활성화
        document.querySelectorAll('.tier-card').forEach(card => {
          const cardTier = card.dataset.tier;
          if (TIER_RANK[cardTier] <= TIER_RANK[sub.tier]) {
            card.classList.add('disabled');
            card.classList.remove('selected');
            // 비활성화된 카드에 설명 추가
            const desc = card.querySelector('.tier-desc');
            if (desc) desc.setAttribute('data-disabled-text', t('tierCurrentOrBelow'));
          }
        });

      } catch (e) {
        console.error('업그레이드 모드 초기화 실패:', e);
        isUpgradeMode = false;
      }
    }

    // ============================================================
    // 가격 로드
    // ============================================================
    async function loadPricesFromDB() {
      if (!supabaseClient) return;
      try {
        const { data } = await supabaseClient
          .from('subscription_prices')
          .select('*')
          .eq('is_active', true);

        if (data && data.length > 0) {
          data.forEach(p => {
            tierPrices[p.tier] = {
              price: p.price_sats,
              durationDays: p.duration_days,
              maxQuantity: p.max_quantity,
              currentSold: p.current_sold,
            };
          });

          // Lifetime 배지 업데이트
          const lt = tierPrices.lifetime;
          if (lt.maxQuantity && lt.maxQuantity !== -1) {
            const remaining = lt.maxQuantity - (lt.currentSold || 0);
            const badge = document.getElementById('lifetime-badge');
            if (remaining <= 0) {
              badge.textContent = t('tierSoldOut');
              document.querySelector('[data-tier="lifetime"]').classList.add('sold-out');
            } else {
              badge.textContent = t('tierRemaining', { n: remaining });
            }
          } else {
            document.getElementById('lifetime-badge').textContent = t('tierLifetimeBadge', { n: lt.maxQuantity || 50 });
          }

          // 가격 라벨 업데이트
          document.getElementById('price-monthly').textContent = `${tierPrices.monthly.price.toLocaleString()} sats${t('perMonth')}`;
          document.getElementById('price-annual').textContent = `${tierPrices.annual.price.toLocaleString()} sats${t('perYear')}`;
          document.getElementById('price-lifetime').textContent = `${tierPrices.lifetime.price.toLocaleString()} sats`;
        }
      } catch (e) {
        console.error('가격 로드 실패:', e);
      }
    }

    // ============================================================
    // 티어 선택 & 가격 표시
    // ============================================================
    function selectTier(tier) {
      currentTier = tier;
      document.querySelectorAll('.tier-card').forEach(c => c.classList.remove('selected'));
      document.querySelector(`[data-tier="${tier}"]`).classList.add('selected');
      updatePriceDisplay();
    }

    function updatePriceDisplay() {
      const basePrice = tierPrices[currentTier].price;
      const origRow = document.getElementById('originalPriceRow');
      const creditRow = document.getElementById('creditRow');
      const discRow = document.getElementById('discountRow');

      // 업그레이드 모드: 크레딧 적용
      let priceAfterCredit = basePrice;
      if (isUpgradeMode && upgradeCredit > 0 && currentSubscription && TIER_RANK[currentTier] > TIER_RANK[currentSubscription.tier]) {
        priceAfterCredit = Math.max(basePrice - upgradeCredit, 1);

        const now = new Date();
        const expiresAt = new Date(currentSubscription.expires_at);
        const remainingDays = Math.max(0, Math.ceil((expiresAt.getTime() - now.getTime()) / (24 * 60 * 60 * 1000)));

        origRow.style.display = 'flex';
        document.getElementById('originalPriceText').textContent = `${basePrice.toLocaleString()} sats`;
        creditRow.style.display = 'flex';
        document.getElementById('creditLabel').textContent = t('priceCreditLabel', { n: remainingDays });
        document.getElementById('creditText').textContent = `-${upgradeCredit.toLocaleString()} sats`;
      } else {
        creditRow.style.display = 'none';
      }

      // 할인코드 적용
      let discountAmount = 0;
      if (currentDiscount) {
        if (currentDiscount.discount_type === 'percent') {
          discountAmount = Math.floor(priceAfterCredit * currentDiscount.discount_value / 100);
        } else {
          discountAmount = Math.min(currentDiscount.discount_value, priceAfterCredit - 1);
        }
      }

      finalPrice = Math.max(priceAfterCredit - discountAmount, 1);

      if (discountAmount > 0) {
        if (!isUpgradeMode || upgradeCredit <= 0) {
          origRow.style.display = 'flex';
          document.getElementById('originalPriceText').textContent = `${basePrice.toLocaleString()} sats`;
        }
        discRow.style.display = 'flex';
        document.getElementById('discountText').textContent = `-${discountAmount.toLocaleString()} sats`;
      } else {
        discRow.style.display = 'none';
        if (!isUpgradeMode || upgradeCredit <= 0) {
          origRow.style.display = 'none';
        }
      }

      document.getElementById('finalPriceText').textContent = `${finalPrice.toLocaleString()} sats`;
    }

    // ============================================================
    // 할인코드
    // ============================================================
    async function applyDiscount() {
      const code = document.getElementById('discountInput').value.trim();
      const msgEl = document.getElementById('discountMsg');

      if (!code) {
        msgEl.textContent = t('discountEmpty');
        msgEl.className = 'discount-msg error';
        return;
      }

      if (!supabaseClient) {
        msgEl.textContent = t('payServerError');
        msgEl.className = 'discount-msg error';
        return;
      }

      try {
        const { data, error } = await supabaseClient
          .from('discount_codes')
          .select('*')
          .ilike('code', code)
          .eq('is_active', true)
          .single();

        if (error || !data) {
          currentDiscount = null;
          msgEl.textContent = t('discountNotFound');
          msgEl.className = 'discount-msg error';
          updatePriceDisplay();
          return;
        }

        const now = new Date();
        if (new Date(data.valid_until) < now) {
          msgEl.textContent = t('discountExpired');
          msgEl.className = 'discount-msg error';
          currentDiscount = null;
          updatePriceDisplay();
          return;
        }

        if (data.max_uses !== -1 && data.current_uses >= data.max_uses) {
          msgEl.textContent = t('discountMaxUsed');
          msgEl.className = 'discount-msg error';
          currentDiscount = null;
          updatePriceDisplay();
          return;
        }

        if (!data.applicable_tiers.includes(currentTier)) {
          msgEl.textContent = t('discountNotApplicable');
          msgEl.className = 'discount-msg error';
          currentDiscount = null;
          updatePriceDisplay();
          return;
        }

        currentDiscount = {
          id: data.id,
          discount_type: data.discount_type,
          discount_value: data.discount_value,
        };

        msgEl.textContent = t('discountApplied');
        msgEl.className = 'discount-msg success';
        updatePriceDisplay();
      } catch (e) {
        msgEl.textContent = t('discountError');
        msgEl.className = 'discount-msg error';
      }
    }

    // ============================================================
    // 결제
    // ============================================================
    async function startPayment() {
      const btn = document.getElementById('payBtn');
      btn.disabled = true;
      btn.innerHTML = `<span class="spinner"></span> ${t('payCreating')}`;

      try {
        if (!userId) {
          alert(t('payLoginRequired'));
          btn.disabled = false;
          btn.textContent = t('payButton');
          return;
        }

        if (!supabaseClient) {
          alert(t('payServerError'));
          btn.disabled = false;
          btn.textContent = t('payButton');
          return;
        }

        const tierLabel = t('tierLabel' + currentTier.charAt(0).toUpperCase() + currentTier.slice(1));
        const typeLabel = isUpgradeMode ? t('invoiceTypeUpgrade') : t('invoiceTypeNew');
        const invoiceMemo = t('invoiceMemo', { tier: tierLabel, type: typeLabel });

        const { data: invoiceData, error: invoiceError } = await supabaseClient.functions.invoke('blink-proxy', {
          body: {
            action: 'createInvoice',
            amountSats: finalPrice,
            memo: invoiceMemo,
          },
        });

        const invoice = invoiceData?.data;
        if (invoiceError || !invoice?.paymentRequest) {
          console.error('Invoice error:', invoiceError, invoiceData);
          throw new Error(t('payInvoiceFailed'));
        }

        const { data: payment, error: payError } = await supabaseClient
          .from('payments')
          .insert({
            user_id: userId,
            amount_sats: finalPrice,
            tier: currentTier,
            original_price_sats: tierPrices[currentTier].price,
            discount_code_id: currentDiscount?.id || null,
            discount_amount_sats: tierPrices[currentTier].price - finalPrice,
            lightning_invoice: invoice.paymentRequest,
            payment_hash: invoice.paymentHash,
            status: 'pending',
            is_upgrade: isUpgradeMode,
            upgrade_credit_sats: isUpgradeMode ? upgradeCredit : 0,
          })
          .select()
          .single();

        if (payError) throw new Error(t('payRecordFailed'));

        currentInvoice = {
          paymentRequest: invoice.paymentRequest,
          paymentHash: invoice.paymentHash,
          paymentId: payment.id,
        };

        showQR(invoice.paymentRequest);
        pollPayment();
      } catch (e) {
        console.error('결제 시작 실패:', e);
        alert(t('payStartFailed'));
        btn.disabled = false;
        btn.textContent = t('payButton');
      }
    }

    function showQR(invoice) {
      document.getElementById('tierSection').style.display = 'none';
      document.querySelector('.discount-section').style.display = 'none';
      document.getElementById('priceSummary').style.display = 'none';
      document.getElementById('payBtn').style.display = 'none';

      const qrSection = document.getElementById('qrSection');
      qrSection.classList.add('visible');

      new QRious({
        element: document.getElementById('qrCanvas'),
        value: invoice,
        size: 240,
        level: 'M',
      });

      document.getElementById('statusText').innerHTML = `<span class="spinner"></span> ${t('payWaiting')}`;
      document.getElementById('invoicePreview').textContent = invoice;
    }

    function copyInvoice() {
      if (!currentInvoice) return;
      navigator.clipboard.writeText(currentInvoice.paymentRequest).then(() => {
        const msg = document.getElementById('copyMsg');
        msg.textContent = t('copied');
        msg.classList.remove('hidden');
        setTimeout(() => msg.classList.add('hidden'), 2000);
      });
    }

    async function pollPayment() {
      if (!currentInvoice || !supabaseClient) return;

      const maxAttempts = 400;
      let attempts = 0;

      const poll = setInterval(async () => {
        attempts++;
        if (attempts > maxAttempts) {
          clearInterval(poll);
          document.getElementById('statusText').innerHTML = t('payTimeout');
          return;
        }

        try {
          const { data } = await supabaseClient.functions.invoke('blink-proxy', {
            body: {
              action: 'checkPaymentStatus',
              paymentRequest: currentInvoice.paymentRequest,
            },
          });

          if (data?.data === 'PAID') {
            clearInterval(poll);
            await completePayment();
          }
        } catch (e) {
          // 폴링 에러 무시
        }
      }, 1500);
    }

    async function completePayment() {
      document.getElementById('statusText').innerHTML = `<span class="spinner"></span> ${t('payActivating')}`;

      try {
        await supabaseClient
          .from('payments')
          .update({ status: 'paid', paid_at: new Date().toISOString() })
          .eq('id', currentInvoice.paymentId);

        // 할인코드 사용 횟수 증가
        if (currentDiscount) {
          const code = document.getElementById('discountInput').value.trim();
          if (code) {
            try { await supabaseClient.rpc('use_discount_code', { p_code: code }); }
            catch (e) { console.error('할인코드 사용 카운트 실패:', e); }
          }
        }

        // 구독 활성화
        const isLifetime = currentTier === 'lifetime';
        const durationDays = tierPrices[currentTier].durationDays;

        const now = new Date();
        const expiresAt = isLifetime ? null : new Date(now.getTime() + durationDays * 24 * 60 * 60 * 1000).toISOString();

        const { data: existing } = await supabaseClient
          .from('subscriptions')
          .select('*')
          .eq('user_id', userId)
          .order('created_at', { ascending: false })
          .limit(1)
          .single();

        if (existing && existing.status === 'active') {
          let updateData;
          if (isLifetime) {
            updateData = { tier: 'lifetime', is_lifetime: true, expires_at: null };
          } else if (TIER_RANK[currentTier] > TIER_RANK[existing.tier]) {
            const freshExpiry = new Date(now.getTime() + durationDays * 24 * 60 * 60 * 1000).toISOString();
            updateData = { tier: currentTier, expires_at: freshExpiry };
          } else if (currentTier === existing.tier) {
            const currentExpiry = new Date(existing.expires_at);
            const extendedExpiry = currentExpiry > now ? new Date(currentExpiry.getTime() + durationDays * 24 * 60 * 60 * 1000) : new Date(now.getTime() + durationDays * 24 * 60 * 60 * 1000);
            updateData = { tier: currentTier, expires_at: extendedExpiry.toISOString() };
          } else {
            throw new Error(t('downgradeError'));
          }

          await supabaseClient
            .from('subscriptions')
            .update(updateData)
            .eq('id', existing.id);
        } else {
          await supabaseClient
            .from('subscriptions')
            .insert({
              user_id: userId,
              status: 'active',
              tier: currentTier,
              is_lifetime: isLifetime,
              started_at: now.toISOString(),
              expires_at: expiresAt,
            });
        }

        // 한정판 판매 수 증가
        if (tierPrices[currentTier].maxQuantity && tierPrices[currentTier].maxQuantity !== -1) {
          await supabaseClient.rpc('increment_tier_sold', { p_tier: currentTier });
        }

        // 성공 표시
        document.getElementById('qrSection').classList.remove('visible');
        document.getElementById('successSection').classList.add('visible');
      } catch (e) {
        console.error('구독 활성화 실패:', e);
        document.getElementById('statusText').innerHTML = t('payActivateFailed');
      }
    }
  </script>
</body>
</html>
